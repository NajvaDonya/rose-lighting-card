<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose Lighting | کارت دیجیتال</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #0f3d2e, #1b5e20);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 380px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(212,175,55,0.5);
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
    }

    .logo {
      width: 110px;
      height: 110px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 2px solid #d4af37;
      overflow: hidden;
      background: #fff;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 22px;
      margin: 8px 0;
      color: #d4af37;
    }

    .sub {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .info {
      font-size: 13px;
      margin: 6px 0;
      line-height: 1.6;
    }

    .btn {
      display: block;
      margin: 8px auto;
      padding: 10px;
      width: 85%;
      background: #d4af37;
      color: #000;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .btn.secondary {
      background: transparent;
      color: #d4af37;
      border: 1px solid #d4af37;
    }

    .qr {
      margin-top: 14px;
      padding: 10px;
      border: 1px dashed #d4af37;
      border-radius: 10px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <img src="logo.jpg" alt="Rose Lighting Logo" />
  </div>

  <h1>Rose Lighting</h1>
  <div class="sub">لوسترهای لوکس، مدرن و سفارشی</div>

  <div class="info">📞 تلفن: 02136058256</div>
  <div class="info">📱 موبایل: 09125625491</div>
  <div class="info">📍 لاله‌زار شمالی، بازار لوستر تهران، طبقه اول پلاک 52</div>

  <a class="btn" href="https://wa.me/989125625491">چت در واتساپ</a>
  <a class="btn" href="https://www.instagram.com/rose.lighting.g?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" target="_blank">صفحه اینستاگرام</a>
  <a class="btn secondary" href="https://maps.app.goo.gl/Z3QixJMEVtqVdYCF8" target="_blank">موقعیت روی نقشه</a>

  <div class="qr">
    QR Code اینجا قرار می‌گیرد (لینک اینستاگرام / کارت دیجیتال)
  </div>

</div>

</body>
</html>
