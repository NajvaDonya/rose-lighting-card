<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rose Lighting | کارت دیجیتال</title>
  <meta name="color-scheme" content="dark">
  <style>
    /* ====== تنظیمات پایه و متغیرها ====== */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    :root{
      --bg-1: #071f1a;
      --bg-2: #103a32; /* رنگ اصلی حفظ شده */
      --accent: #c9a24ad1;
      --max-width: 420px;
      --card-padding: 20px;
      --item-delay: 140; /* ms بین آیتم‌ها */
      --logo-intro-size: 44vmin; /* responsive initial logo */
      --logo-card-size: 110px;
      --radius: 18px;
    }

    /* ====== ریست و پایه ====== */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Inter',system-ui,Roboto,Arial;
      display:flex;align-items:center;justify-content:center;
      background: linear-gradient(180deg, var(--bg-1) 0%, #0b2a24 45%, var(--bg-2) 100%);
      padding:24px;color:#fff;overflow:hidden;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    }

    /* ====== نور خطی ملایم ====== */
    .linear-sweep{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background: linear-gradient(120deg,
        rgba(255,255,255,0.00) 0%,
        rgba(255,255,255,0.05) 30%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.05) 70%,
        rgba(255,255,255,0.00) 100%);
      transform: translateY(40%) rotate(-18deg) scale(1.2);
      opacity:0.42; mix-blend-mode: screen; filter: blur(18px) saturate(1.05);
      animation: sweepIn 2.6s ease forwards;
    }
    @keyframes sweepIn{
      0%{ opacity:0; transform: translateY(60%) rotate(-18deg) scale(1.25); }
      40%{ opacity:0.7; transform: translateY(18%) rotate(-18deg) scale(1.12); }
      100%{ opacity:0.42; transform: translateY(0) rotate(-18deg) scale(1); }
    }

    /* ====== صحنه و کارت (بدون باکس جدا) ====== */
    .stage{
      position:relative; z-index:3; width:100%; max-width:var(--max-width);
      display:flex; align-items:center; justify-content:center; min-height:60vh;
      padding:calc(var(--card-padding) + 8px);
    }

    .card{
      width:100%;
      background: linear-gradient(180deg, rgba(16,58,50,0.06), rgba(16,58,50,0.04));
      border-radius:var(--radius);
      padding:calc(var(--card-padding));
      text-align:center;
      box-sizing:border-box;
      backdrop-filter: blur(6px) saturate(1.02);
      box-shadow: 0 8px 30px rgba(2,10,8,0.18);
      opacity:0; transform: translateY(10px);
      transition: opacity .56s ease, transform .56s cubic-bezier(.2,.9,.3,1);
      -webkit-tap-highlight-color: transparent;
    }
    .card.revealed{ opacity:1; transform: translateY(0); }

    /* ====== لوگوی اولیه (overlay, بدون کادر) ====== */
    .intro-logo-wrap{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:6; pointer-events:none;
    }
    .intro-logo{
      width:var(--logo-intro-size); height:var(--logo-intro-size); border-radius:50%; overflow:hidden;
      background:transparent; transform: scale(0.98); opacity:0;
      transition: transform .7s cubic-bezier(.2,.9,.3,1), opacity .5s ease;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      will-change: transform, opacity;
    }
    .intro-logo img{ width:100%; height:100%; object-fit:cover; display:block; }

    /* ====== لوگوی داخل کارت (حفظ شده) ====== */
    .card-logo{
      width:var(--logo-card-size); height:var(--logo-card-size); border-radius:50%; overflow:hidden;
      background:#fff; border:3px solid var(--accent);
      display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
      opacity:0; transform: translateY(8px) scale(.98);
      transition: opacity .45s ease, transform .45s cubic-bezier(.2,.9,.3,1);
    }
    .card-logo.visible{ opacity:1; transform: translateY(0) scale(1); }

    /* ====== آیتم‌ها (ترتیبی) ====== */
    .item{ opacity:0; transform: translateY(10px) scale(.995); transition: opacity .45s ease, transform .45s cubic-bezier(.2,.9,.3,1); }
    .item.visible{ opacity:1; transform: translateY(0) scale(1); }

    h1{ font-size:clamp(18px,2.6vw,22px); color:var(--accent); font-weight:700; margin:8px 0 6px; }
    .sub{ font-size:clamp(13px,2.2vw,15px); color:rgba(255,255,255,0.95); font-weight:600; margin-bottom:10px; line-height:1.45; }
    .info{ font-size:clamp(12px,2.0vw,14px); color:rgba(255,255,255,0.92); margin:6px 0; line-height:1.6; display:flex; justify-content:center; gap:8px; align-items:center; }

    .socials{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:22px; opacity:0; transform: translateY(8px); transition: opacity .45s ease, transform .45s ease; }
    .socials.visible{ opacity:1; transform: translateY(0); }

    .img{ width:64px; height:64px; background:#fff; border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition: transform .18s ease, box-shadow .18s ease; box-shadow:0 8px 20px rgba(0,0,0,0.14); }
    .img:hover{ transform: translateY(-6px) scale(1.03); box-shadow:0 18px 36px rgba(0,0,0,0.26); }
    .img img{ width:36px; height:36px; display:block; }

    /* ====== دسترس‌پذیری: کاهش حرکت ====== */
    @media (prefers-reduced-motion: reduce){
      .linear-sweep, .intro-logo, .card, .card-logo, .item, .socials { animation: none !important; transition: none !important; transform: none !important; opacity: 1 !important; }
    }

    /* ====== موبایل و تبلت ====== */
    @media (max-width:720px){
      :root{ --logo-intro-size: 56vmin; --logo-card-size: 96px; --card-padding: 16px; }
      .stage{ min-height:56vh; padding:18px; }
      .img{ width:56px; height:56px; border-radius:12px; }
    }
    @media (max-width:420px){
      :root{ --logo-intro-size: 64vmin; --logo-card-size: 84px; --card-padding: 12px; }
      .stage{ min-height:52vh; padding:12px; }
      h1{ font-size:18px; }
      .sub{ font-size:13px; }
      .img{ width:48px; height:48px; }
    }

    /* ====== انتخاب متن قابل کپی و نمایش بهتر در موبایل ====== */
    .info { user-select: text; -webkit-user-select: text; }

  </style>
</head>
<body>

  <!-- نور خطی -->
  <div class="linear-sweep" aria-hidden="true"></div>

  <!-- لوگوی اولیه بدون کادر (overlay) -->
  <div class="intro-logo-wrap" id="introWrap" aria-hidden="true">
    <div class="intro-logo" id="introLogo" role="img" aria-label="لوگوی Rose Lighting">
      <img src="logo.png" alt="لوگوی Rose Lighting" />
    </div>
  </div>

  <!-- صحنه و کارت (شفاف، ادغام با پس‌زمینه) -->
  <main class="stage" role="main" aria-labelledby="brandTitle">
    <section class="card" id="card" aria-labelledby="brandTitle">
      <div class="card-logo item" id="cardLogo" aria-hidden="false">
        <img src="logo.png" alt="لوگوی کوچک Rose Lighting" />
      </div>

      <h1 class="item" id="brandTitle">Rose Lighting</h1>

      <div class="sub item" id="sub">فروش تک و عمده لوسترهای مدرن کلاسیک و نئوکلاسیک</div>

      <div class="info item" id="phone">📞 تلفن: 02136058256</div>
      <div class="info item" id="mobile">📱 موبایل: 09125625491</div>
      <div class="info item" id="addr">📍 لاله‌زار شمالی، بازار لوستر تهران، طبقه اول پلاک 52</div>

      <div class="socials item" id="socials" aria-label="شبکه‌های اجتماعی">
        <a class="img" href="https://wa.me/989125625491" target="_blank" aria-label="WhatsApp">
          <img src="https://th.bing.com/th/id/ODF.EYbt7H4cU1mljj9wrCZBAg?w=32&h=32" alt="واتساپ" />
        </a>

        <a class="img" href="https://www.instagram.com/rose.lighting.g" target="_blank" aria-label="Instagram">
          <img src="https://th.bing.com/th/id/ODF.vj_OJJ20ikL-Sn119NFmXw?w=32&h=32" alt="اینستاگرام" />
        </a>

        <a class="img" href="https://maps.app.goo.gl/Z3QixJMEVtqVdYCF8" target="_blank" aria-label="Map">
          <img src="https://th.bing.com/th/id/ODF.OOt6apqXkJpZmQiZ38LMFA?w=32&h=32" alt="نقشه" />
        </a>
      </div>
    </section>
  </main>

  <script>
    // اجرای امن پس از بارگذاری DOM
    document.addEventListener('DOMContentLoaded', function () {
      try {
        const introLogo = document.getElementById('introLogo');
        const introWrap = document.getElementById('introWrap');
        const card = document.getElementById('card');

        // آیتم‌ها به ترتیب ظاهر شدن
        const items = Array.from(document.querySelectorAll('.item'));

        // تنظیمات زمانی (می‌توانید تغییر دهید)
        const showIntroDelay = 260;   // ms قبل از ظاهر شدن لوگوی اولیه
        const introHold = 1000;       // ms مدت نمایش لوگوی اولیه
        const introFade = 420;        // ms مدت فِید اوت لوگوی اولیه
        const baseDelay = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--item-delay')) || 140;

        // 1) نمایش لوگوی اولیه (overlay)
        setTimeout(() => {
          introLogo.style.opacity = '1';
          introLogo.style.transform = 'scale(1.02)';
        }, showIntroDelay);

        // 2) پس از نگه داشتن، لوگوی اولیه فِید اوت و کارت ظاهر می‌شود
        setTimeout(() => {
          introLogo.style.opacity = '0';
          introLogo.style.transform = 'scale(0.9)';
          setTimeout(() => {
            introWrap.style.display = 'none';
            // نمایش کارت کلی
            card.classList.add('revealed');
            // نمایش آیتم‌ها دونه‌دونه
            items.forEach((el, idx) => {
              setTimeout(() => {
                el.classList.add('visible');
              }, idx * baseDelay + 80);
            });
          }, introFade);
        }, showIntroDelay + introHold);

        // کلیک روی overlay برای عبور سریع (برای موبایل هم مفید است)
        introWrap.addEventListener('click', () => {
          introLogo.style.opacity = '0';
          introLogo.style.transform = 'scale(0.9)';
          setTimeout(() => {
            introWrap.style.display = 'none';
            card.classList.add('revealed');
            items.forEach((el, idx) => setTimeout(()=> el.classList.add('visible'), idx * baseDelay + 80));
          }, introFade);
        });

        // بهبود لمس: وقتی کاربر روی هر آیکون لمس کند، بازخورد لمسی بده
        document.querySelectorAll('.img').forEach(btn => {
          btn.addEventListener('touchstart', () => btn.style.transform = 'translateY(-4px) scale(1.02)');
          btn.addEventListener('touchend', () => btn.style.transform = '');
        });

      } catch (err) {
        console.error('Init error:', err);
      }
    });
  </script>
</body>
</html>
