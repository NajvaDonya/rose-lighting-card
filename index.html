<!DOCTYPE html>

  <meta charset="UTF-8" />

  <title>Rose Lighting | کارت دیجیتال</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color:#ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 380px;
      background: #103a32;
      border: 1px solid rgba(212,175,55,0.5);
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      height: 500px;      
    }

    .logo {
      width: 130px;
      height: 130px;
      margin: 0px auto 12px;
      border-radius: 50%;
      border: 2px solid #103a32;
      overflow: hidden;
      background: #fff;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
    font-size: 22px;
    font-weight: bolder;
    color: #C9A24A;
    }

    .sub {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 24px;
    }

    .info {
    font-size: 13px;
    margin: 16px 0;
    line-height: 1.6;
    }

    .btn {
      display: block;
      margin: 8px auto;
      padding: 10px;
      width: 85%;
      background: #103a32;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      border: 3px solid #d1b93c;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .btn.secondary {
      background: transparent;
      color: #978919;
      border: 1px solid #103a32;
    }

    .qr {
      margin-top: 14px;
      padding: 10px;
      border: 1px dashed #103a32;
      border-radius: 10px;
      font-size: 12px;
      color: #ccc;
    }
    .img{
    display: inline-block;
    width: 60px;
    height: 60px;
    background: #ffffff;
    vertical-align: middle;
    border-radius: 30%;
    margin: 10px 10px;
    }
        .img img{
margin-top: 14px;
    }
