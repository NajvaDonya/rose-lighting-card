<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Rose Lighting | کارت دیجیتال</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color:#ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 380px;
      background: #103a32;
      border: 1px solid rgba(212,175,55,0.5);
      border-radius: 22px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      height: 63%;      
    }

    .logo {
      width: 110px;
      height: 110px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 2px solid #103a32;
      overflow: hidden;
      background: #fff;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 22px;
      margin: 8px 0;
      color: #103a32;
    }

    .sub {
      font-size: 13px;
      opacity: 0.9;
      margin-bottom: 10px;
    }

    .info {
      font-size: 13px;
      margin: 6px 0;
      line-height: 1.6;
    }

    .btn {
      display: block;
      margin: 8px auto;
      padding: 10px;
      width: 85%;
      background: #103a32;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      border: 3px solid #d1b93c;
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .btn.secondary {
      background: transparent;
      color: #103a32;
      border: 1px solid #103a32;
    }

    .qr {
      margin-top: 14px;
      padding: 10px;
      border: 1px dashed #103a32;
      border-radius: 10px;
      font-size: 12px;
      color: #ccc;
    }
    body{
    margin: 0;
    padding: 0;
    background: lightblue;
}
div{
    width: 70px;
    height: 70px;
    border-radius: 35px;
    background: #3AC371;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%,-50%);
}
.white{
    width: 80px;
    height: 80px;
    border-radius: 40px;
    background-color: #fff;
    box-shadow: 2px 2px 3px 2px rgba(0,0,0,.3);
}
.white::before{
    content: "";
    top: 65px;
    left: -15px;
    border-width: 20px;
    border-style: solid;
    border-color: transparent #fff transparent transparent;
    position: absolute;
    transform: rotate(-50deg) rotateX(-55deg);
}
.white::after{
    content: "";
    top: 63px;
    left: -4px;
    border-width: 15px;
    border-style: solid;
    border-color: transparent #3AC371 transparent transparent;
    position: absolute;
    transform: rotate(-51deg) rotateX(-50deg);
}
.fas{
    left: 17px;
    top: 18px;
    position: absolute;
    font-size: 35px;
    color: #fff;
    transform: rotate(90deg);
}
  </style>
</head>
<body>

<div class="card">
