<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rose Lighting | کارت دیجیتال</title>
  <meta name="color-scheme" content="dark">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    :root{
      --bg-top: #0b2a24;
      --bg-bottom: #103a32; /* رنگ اصلی حفظ شده */
      --accent: #c9a24ad1;
      --max-width: 420px;
      --pad: 20px;
      --item-delay: 140; /* ms بین آیتم‌ها */
      --intro-size: 48vmin; /* اندازه لوگوی اولیه (responsive) */
      --card-logo-size: 110px;
      --radius: 18px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Inter',system-ui,Roboto,Arial;
      display:flex;align-items:center;justify-content:center;
      background: linear-gradient(180deg, var(--bg-top) 0%, #0f332b 55%, var(--bg-bottom) 100%);
      padding:24px;color:#fff;overflow:hidden;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    }

    /* نور خطی ملایم از پایین به بالا */
    .linear-sweep{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background: linear-gradient(120deg,
        rgba(255,255,255,0.00) 0%,
        rgba(255,255,255,0.05) 30%,
        rgba(255,255,255,0.10) 50%,
        rgba(255,255,255,0.05) 70%,
        rgba(255,255,255,0.00) 100%);
      transform: translateY(40%) rotate(-18deg) scale(1.2);
      opacity:0.42; mix-blend-mode: screen; filter: blur(18px) saturate(1.05);
      animation: sweepIn 2.6s ease forwards;
    }
    @keyframes sweepIn{
      0%{ opacity:0; transform: translateY(60%) rotate(-18deg) scale(1.25); }
      40%{ opacity:0.7; transform: translateY(18%) rotate(-18deg) scale(1.12); }
      100%{ opacity:0.42; transform: translateY(0) rotate(-18deg) scale(1); }
    }

    /* صحنه (بدون باکس جدا) */
    .stage{
      position:relative; z-index:3; width:100%; max-width:var(--max-width);
      display:flex; align-items:center; justify-content:center; min-height:60vh;
      padding:calc(var(--pad) + 6px);
    }

    /* کارت ادغام‌شده: بدون border یا پس‌زمینهٔ قوی */
    .card{
      width:100%;
      background: linear-gradient(180deg, rgba(16,58,50,0.04), rgba(16,58,50,0.02));
      border-radius:var(--radius);
      padding:calc(var(--pad));
      text-align:center;
      box-sizing:border-box;
      backdrop-filter: blur(6px) saturate(1.02);
      box-shadow: 0 8px 30px rgba(2,10,8,0.12);
      opacity:0; transform: translateY(10px);
      transition: opacity .56s ease, transform .56s cubic-bezier(.2,.9,.3,1);
      -webkit-tap-highlight-color: transparent;
    }
    .card.revealed{ opacity:1; transform: translateY(0); }

    /* لوگوی اولیه (overlay, بدون کادر) */
    .intro-wrap{
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:6; pointer-events:none;
    }
    .intro-logo{
      width:var(--intro-size); height:var(--intro-size); border-radius:50%; overflow:hidden;
      background:transparent; transform: scale(0.98); opacity:0;
      transition: transform .7s cubic-bezier(.2,.9,.3,1), opacity .5s ease;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      will-change: transform, opacity;
    }
    .intro-logo img{ width:100%; height:100%; object-fit:cover; display:block; }

    /* لوگوی داخل کارت (حفظ شده) */
    .card-logo{
      width:var(--card-logo-size); height:var(--card-logo-size); border-radius:50%; overflow:hidden;
      background:#fff; border:3px solid var(--accent);
      display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.22);
      opacity:0; transform: translateY(8px) scale(.98);
      transition: opacity .45s ease, transform .45s cubic-bezier(.2,.9,.3,1);
    }
    .card-logo.visible{ opacity:1; transform: translateY(0) scale(1); }

    /* آیتم‌ها (ترتیبی) */
    .item{ opacity:0; transform: translateY(10px) scale(.995); transition: opacity .45s ease, transform .45s cubic-bezier(.2,.9,.3,1); }
    .item.visible{ opacity:1; transform: translateY(0) scale(1); }

    h1{ font-size:clamp(18px,2.6vw,22px); color:var(--accent); font-weight:700; margin:8px 0 6px; }
    .sub{ font-size:clamp(13px,2.2vw,15px); color:rgba(255,255,255,0.95); font-weight:600; margin-bottom:10px; line-height:1.45; }
    .info{ font-size:clamp(12px,2.0vw,14px); color:rgba(255,255,255,0.92); margin:6px 0; line-height:1.6; display:flex; justify-content:center; gap:8px; align-items:center; }

    .socials{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; margin-top:22px; opacity:0; transform: translateY(8px); transition: opacity .45s ease, transform .45s ease; }
    .socials.visible{ opacity:1; transform: translateY(0); }
