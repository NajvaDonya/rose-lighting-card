<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Rose Lighting | کارت دیجیتال</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --card-base: #103a32;
            --accent: #c9a24ad1;
            --card-w: 380px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html, body {
            height: 100%
        }

        body {
            font-family: 'Inter',system-ui,Roboto,Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgb(64 145 129 / 98%), rgb(4 28 24 / 98%));
            padding: 24px;
            color: #fff;
            overflow: hidden;
        }

        /* لایه نور خطی ملایم (اختیاری) */
        .linear-sweep {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(255,255,255,0.00) 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 70%, rgba(255,255,255,0.00) 100%);
            transform: translateY(40%) rotate(-18deg) scale(1.2);
            opacity: 0.42;
            mix-blend-mode: screen;
            filter: blur(18px) saturate(1.05);
        }

        /* لوگوی اولیه (بدون کادر) — overlay */
        .intro-logo-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            pointer-events: none;
        }

        .intro-logo {
            width: 50%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.9);
            opacity: 0;
            transition: transform .8s cubic-bezier(.2, .9, .3, 1), opacity .6s ease;
            will-change: transform, opacity;
        }

            .intro-logo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

        /* کارت (ابتدا مخفی) */
        .stage {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: var(--card-w);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 560px;
        }

        .card {
            width: 100%;
            border-radius: 22px;
            padding: 28px 22px;
            text-align: center;
            box-sizing: border-box;
            overflow: visible;
            transform: translateY(12px) scale(0.995);
            opacity: 0;
            transition: transform .6s cubic-bezier(.2, .9, .3, 1), opacity .6s ease;
        }

            .card.revealed {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

        /* لوگوی داخل کارت (حفظ شده، با کادر) */
        .card-logo {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            overflow: hidden;
            background: #fff;
            border: 3px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 22px rgba(0,0,0,0.45);
            margin: 0 auto 12px;
        }

            .card-logo img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

        h1 {
            font-size: 22px;
            color: var(--accent);
            font-weight: 700;
            margin: 10px 0 6px;
            letter-spacing: .2px;
        }

        .sub {
            font-size: 14px;
            color: rgba(255,255,255,0.95);
            font-weight: 600;
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .info {
            font-size: 14px;
            color: rgba(255,255,255,0.92);
            margin: 8px 0;
            line-height: 1.6;
        }

        .card-content {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .45s ease .12s, transform .45s ease .12s;
        }

            .card-content.visible {
                opacity: 1;
                transform: translateY(0);
            }

        .socials {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 56px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .5s ease .15s, transform .5s ease .15s;
        }

            .socials.visible {
                opacity: 1;
                transform: translateY(0);
            }

        .img {
            width: 72px;
            height: 72px;
            background: #fff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .22s ease, box-shadow .22s ease;
            box-shadow: 0 10px 26px rgba(0,0,0,0.22);
        }

            .img:hover {
                transform: translateY(-6px) scale(1.03);
                box-shadow: 0 20px 40px rgba(0,0,0,0.32);
            }

            .img img {
                width: 40px;
                height: 40px;
                display: block;
            }

        /* واکنش‌گرایی موبایل */
        @media (max-width:480px) {
            .intro-logo {
                width: 160px;
                height: 160px;
            }

            .card-logo {
                width: 96px;
                height: 96px;
            }

            .img {
                width: 56px;
                height: 56px;
                border-radius: 12px
            }

                .img img {
                    width: 28px;
                    height: 28px
                }

            h1 {
                font-size: 18px
            }

            .card {
                padding: 16px;
                border-radius: 16px;
                min-height: 480px;
            }
        }
    </style>
</head>
<body>

    <!-- نور خطی پس‌زمینه (اختیاری) -->
    <div class="linear-sweep" aria-hidden="true"></div>

    <!-- لوگوی اولیه بدون کادر (overlay) -->
    <div class="intro-logo-wrap" id="introWrap" aria-hidden="true">
        <div class="intro-logo" id="introLogo">
            <img src="logo.png" alt="Rose Lighting Logo" />
        </div>
    </div>

    <!-- کارت (حاوی لوگوی کوچک با کادر) -->
    <main class="stage" role="main">
        <section class="card" id="card" aria-labelledby="brandTitle">
            <div class="card-content" id="cardContent">
                <div class="card-logo">
                    <img src="logo.png" alt="Rose Lighting Logo small" />
                </div>

                <h1 id="brandTitle">Rose Lighting</h1>
                <div class="sub">فروش تک و عمده لوسترهای مدرن کلاسیک و نئوکلاسیک</div>

                <div class="info">📞 تلفن: 02136058256</div>
                <div class="info">📱 موبایل: 09125625491</div>
                <div class="info">📍 لاله‌زار شمالی، بازار لوستر تهران، طبقه اول پلاک 52</div>

                <div class="socials" id="socials">
                    <a class="img" href="https://wa.me/989125625491" target="_blank" aria-label="WhatsApp">
                        <img src="https://th.bing.com/th/id/ODF.EYbt7H4cU1mljj9wrCZBAg?w=32&h=32" alt="wa" />
                    </a>

                    <a class="img" href="https://www.instagram.com/rose.lighting.g" target="_blank" aria-label="Instagram">
                        <img src="https://th.bing.com/th/id/ODF.vj_OJJ20ikL-Sn119NFmXw?w=32&h=32" alt="ig" />
                    </a>

                    <a class="img" href="https://maps.app.goo.gl/Z3QixJMEVtqVdYCF8" target="_blank" aria-label="Map">
                        <img src="https://th.bing.com/th/id/ODF.OOt6apqXkJpZmQiZ38LMFA?w=32&h=32" alt="map" />
                    </a>
                </div>
            </div>
        </section>
    </main>

    <script>
        // اجرای امن پس از بارگذاری DOM
        document.addEventListener('DOMContentLoaded', function () {
            try {
                const introLogo = document.getElementById('introLogo');
                const introWrap = document.getElementById('introWrap');
                const card = document.getElementById('card');
                const cardContent = document.getElementById('cardContent');
                const socials = document.getElementById('socials');

                // اطمینان از وجود عناصر
                if (!introLogo || !card || !cardContent || !socials) {
                    console.error('Element missing:', { introLogo: !!introLogo, card: !!card, cardContent: !!cardContent, socials: !!socials });
                    return;
                }

                // ترتیب انیمیشن:
                // 1) لوگوی اولیه فِید این (ظاهر شدن)
                // 2) نگه داشتن برای مدت کوتاه
                // 3) لوگوی اولیه فِید اوت (مخفی)
                // 4) نمایش کارت و محتوای داخل آن
                const tShowIntro = 300;   // شروع ظاهر شدن بعد از بارگذاری (ms)
                const tHoldIntro = 1200;  // مدت نمایش لوگوی اولیه (ms)
                const tFade = 500;        // مدت زمان فِید این/اوت (ms)
                const tAfter = 120;       // تاخیر قبل از نمایش شبکه‌های اجتماعی (ms)

                // 1) فِید این لوگوی اولیه
                setTimeout(() => {
                    introLogo.style.opacity = '1';
                    introLogo.style.transform = 'scale(1.02)';
                }, tShowIntro);

                // 2) نگه داشتن، سپس فِید اوت
                setTimeout(() => {
                    // شروع فِید اوت
                    introLogo.style.opacity = '0';
                    introLogo.style.transform = 'scale(0.9)';
                    // بعد از اتمام فِید اوت، wrapper را از صفحه حذف (display:none) تا کلیک‌ها یا pointer-events مزاحم نشود
                    setTimeout(() => {
                        introWrap.style.display = 'none';
                        // 3) نمایش کارت و محتوای آن
                        card.classList.add('revealed');
                        cardContent.classList.add('visible');
                        // 4) نمایش شبکه‌های اجتماعی با تاخیر کوچک
                        setTimeout(() => socials.classList.add('visible'), tAfter);
                    }, tFade);
                }, tShowIntro + tHoldIntro);

                // اگر کاربر زودتر کلیک کرد، انیمیشن را سریع عبور بده
                introWrap.addEventListener('click', () => {
                    introLogo.style.opacity = '0';
                    introLogo.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        introWrap.style.display = 'none';
                        card.classList.add('revealed');
                        cardContent.classList.add('visible');
                        setTimeout(() => socials.classList.add('visible'), tAfter);
                    }, tFade);
                });

            } catch (err) {
                console.error('Init error:', err);
            }
        });
    </script>
</body>
</html>
