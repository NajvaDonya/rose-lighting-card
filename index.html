<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rose Lighting | کارت دیجیتال</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
  width: 100%;
  max-width: 380px;
  background: #103a32;
  border: 3px solid #c9a24ad1;
  border-radius: 22px;
  padding: 30px 22px; 
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  box-sizing: border-box;
  min-height: 560px;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 12px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      border: 2px solid #c9a24ad1;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 22px;
      font-weight: bold;
      color: #c9a24ad1;
      margin: 10px 0;
    }

    .sub {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .info {
      font-size: 14px;
      margin: 10px 0;
      line-height: 1.6;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    margin-top: 68px;
    }

    .img {
      width: 70px;
      height: 70px;
      background: #fff;
      border-radius: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: 0.3s;
      margin: -20px 4px;
    }

    .img:hover {
      transform: scale(1.05);
    }

    .img img {
      width: 40px;
      height: 40px;
    }

    /* 📱 Mobile */
    @media (max-width: 480px) {
      .card {
        padding: 16px;
        border-radius: 18px;
      }

      h1 {
        font-size: 18px;
      }

      .sub {
        font-size: 13px;
      }

      .info {
        font-size: 12px;
      }

      .logo {
        width: 100px;
        height: 100px;
      }

      .img {
        width: 50px;
        height: 50px;
      }

      .img img {
        width: 24px;
        height: 24px;
      }
    }

    /* 💻 Large screens */
    @media (min-width: 1200px) {
      .card {
        max-width: 420px;
      }
    }

  </style>
</head>

<body>

<div class="card">

  <div class="logo">
    <img src="logo.png" alt="Rose Lighting Logo" />
  </div>

  <h1>Rose Lighting</h1>
  <div class="sub">فروش تک و عمده لوسترهای مدرن کلاسیک و نئوکلاسیک</div>

  <div class="info">📞 تلفن: 02136058256</div>
  <div class="info">📱 موبایل: 09125625491</div>
  <div class="info">📍 لاله‌زار شمالی، بازار لوستر تهران، طبقه اول پلاک 52</div>

  <div class="socials">
    <a class="img" href="https://wa.me/989125625491" target="_blank">
      <img src="https://th.bing.com/th/id/ODF.EYbt7H4cU1mljj9wrCZBAg?w=32&h=32" />
    </a>

    <a class="img" href="https://www.instagram.com/rose.lighting.g" target="_blank">
      <img src="https://th.bing.com/th/id/ODF.vj_OJJ20ikL-Sn119NFmXw?w=32&h=32" />
    </a>

    <a class="img" href="https://maps.app.goo.gl/Z3QixJMEVtqVdYCF8" target="_blank">
      <img src="https://th.bing.com/th/id/ODF.OOt6apqXkJpZmQiZ38LMFA?w=32&h=32" />
    </a>
  </div>

</div>

</body>
</html>
